name: Refresh live data

on:
  schedule:
    # 07:00 UTC daily = 15:00 Beijing / 03:00 US Eastern
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh live company data
        run: python scripts/refresh_data.py

      - name: Commit if changed
        run: |
          git config user.name "culture-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/live_companies.json
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            STAMP=$(date -u +"%Y-%m-%d")
            git commit -m "Refresh live data ($STAMP)"
            git push
          fi
